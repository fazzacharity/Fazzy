<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prince Fazza Charity Foundation | Official Portal</title>
    <!-- Styles to completely hide any Google Translate default frames and banners -->
    <style>
      iframe.skiptranslate {
        display: none !important;
        visibility: hidden !important;
      }
      .skiptranslate, .goog-te-banner-frame, #goog-gt-tt, .goog-te-balloon-frame {
        display: none !important;
        visibility: hidden !important;
      }
      body {
        top: 0px !important;
      }
      .goog-text-highlight {
        background: transparent !important;
        background-color: transparent !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none; visibility:hidden; position:absolute; left:-9999px;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,fr,es,ar,zh,hi,pt,ru,de,ja,ko,it,tr,nl,sw,bn,ur,id,vi,th',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
